---
layout: default
---

<article class="post">

  <h1>{{ page.title }}</h1>

  <div class="meta">
    <span>{{ page.date | date: "%Y-%m-%d" }}</span>
    {% if page.tags %}
      <div class="tag-list">
        {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </div>

  <div class="post-body">
    {{ content }}
  </div>

</article>
